<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000008; overflow: hidden; }
    #game { width: 100%; height: 100%; }

    #ps-loader {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0.6rem 1rem;
      background: linear-gradient(to top, rgba(0,0,8,0.95) 0%, rgba(0,0,8,0) 100%);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    #ps-loader-label {
      font-family: ui-monospace, monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: #4466bb;
      text-transform: uppercase;
    }
    #ps-track {
      height: 3px;
      background: rgba(34,119,238,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #ps-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2255cc, #44aaff);
      box-shadow: 0 0 8px #2277ee88;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <div id="ps-loader">
    <div id="ps-loader-label">Loading Crash Bandicoot… <span id="ps-pct">0%</span></div>
    <div id="ps-track"><div id="ps-fill"></div></div>
  </div>

  <script>
    const fill  = document.getElementById('ps-fill');
    const pct   = document.getElementById('ps-pct');
    const loader = document.getElementById('ps-loader');

    function setProgress(p) {
      const v = Math.min(100, Math.round(p));
      fill.style.width = v + '%';
      pct.textContent  = v + '%';
      if (v >= 100) setTimeout(() => { loader.style.display = 'none'; }, 800);
    }

    // Intercept XHR (Emscripten uses XHR to fetch the ROM)
    const _XHR = window.XMLHttpRequest;
    window.XMLHttpRequest = function() {
      const xhr = new _XHR();
      const origOpen = xhr.open.bind(xhr);
      xhr.open = function(method, url, ...rest) {
        if (typeof url === 'string' && url.includes('/api/rom/')) {
          xhr.addEventListener('progress', e => {
            if (e.lengthComputable) setProgress((e.loaded / e.total) * 100);
          });
          xhr.addEventListener('load', () => setProgress(100));
        }
        return origOpen(method, url, ...rest);
      };
      return xhr;
    };
    window.XMLHttpRequest.prototype = _XHR.prototype;

    EJS_player        = '#game';
    EJS_core          = 'pcsx_rearmed';
    EJS_gameUrl       = '/api/rom/crash-bandicoot';
    EJS_color         = '#2277ee';
    EJS_startOnLoaded = true;
    EJS_pathtodata    = 'https://cdn.emulatorjs.org/stable/data/';
  </script>
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
